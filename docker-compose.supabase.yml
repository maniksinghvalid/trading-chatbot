# docker-compose.supabase.yml — production stack for trading-chatbot using
# Supabase as the managed Postgres backend (no self-hosted db service).
#
# Differs from docker-compose.production.yml:
#   - The `db` service is removed; Postgres is Supabase (external, managed).
#   - backend has no `depends_on: db` (nothing local to wait for).
#   - DATABASE_URL points at the Supabase *Session pooler* with SSL.
#
# Services:
#   backend  — FastAPI / uvicorn image built from backend/Dockerfile
#   frontend — Next.js image built from frontend/Dockerfile
#
# IMPORTANT: All secrets are injected via environment variables.
# DO NOT hardcode any secret values in this file or in any Dockerfile.
#
# Supabase connection (set in env / .env — NOT committed):
#   SUPABASE_DB_PASSWORD   — the database password from the Supabase dashboard
#   SUPABASE_PROJECT_REF   — your project ref (e.g. abcdefghijklmnop)
#   SUPABASE_REGION        — pooler region (e.g. us-east-1)
#
# Then either:
#   (a) set DATABASE_URL directly to the full Supabase URL, or
#   (b) let the default below compose it from the three vars above.
#
# Connection notes:
#   - Use the SESSION pooler (host aws-0-<region>.pooler.supabase.com, port 5432).
#     The username MUST be `postgres.<project-ref>` (pooler requirement).
#   - sslmode=require is mandatory — Supabase rejects non-SSL connections.
#   - Do NOT use the direct connection (db.<ref>.supabase.co:5432): it is
#     IPv6-only and typically unreachable from inside Docker.
#   - If you switch to the TRANSACTION pooler (port 6543), append
#     `&prepare_threshold=0` — psycopg3 prepared statements break under it.
#
# Usage:
#   docker compose -f docker-compose.supabase.yml up -d   # start backend + frontend
#   docker compose -f docker-compose.supabase.yml down    # stop

services:

  # ------------------------------------------------------------------
  # Backend — FastAPI / uvicorn (talks to Supabase Postgres)
  # ------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading-chatbot-backend
    environment:
      # Database — Supabase Session pooler over SSL.
      # Override DATABASE_URL wholesale, or supply the three SUPABASE_* vars
      # and let this default compose the URL.
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres.${SUPABASE_PROJECT_REF}:${SUPABASE_DB_PASSWORD}@aws-0-${SUPABASE_REGION}.pooler.supabase.com:5432/postgres?sslmode=require}

      # Pinecone — READ key only (consumer contract)
      PINECONE_READ_KEY: ${PINECONE_READ_KEY}
      PINECONE_HOST: ${PINECONE_HOST}

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # JWT auth
      JWT_SECRET: ${JWT_SECRET}

      # Magic-link email (Resend). The backend reads EMAIL_PROVIDER_API_KEY
      # (settings.email_provider_api_key) — NOT RESEND_API_KEY.
      EMAIL_PROVIDER_API_KEY: ${EMAIL_PROVIDER_API_KEY}
      # Sender MUST be a Resend-verified domain or sends fail. Default is the
      # project's verified sender; override per deployment as needed.
      MAGIC_LINK_FROM_EMAIL: "${MAGIC_LINK_FROM_EMAIL:-Trading Chatbot <noreply@mga-pservices.cloud>}"
      BACKEND_URL: ${BACKEND_URL}

      # CORS — allow the deployed frontend origin
      CORS_ORIGINS: ${CORS_ORIGINS}

      # Uvicorn port (platform may inject PORT)
      PORT: ${PORT:-8000}
    ports:
      - "${BACKEND_PORT:-8000}:${PORT:-8000}"
    restart: unless-stopped
    healthcheck:
      # Use Python (always present in the backend image) instead of curl, which
      # is not installed in python:slim. urlopen raises on connection failure or
      # non-2xx, yielding a non-zero exit; a 200 returns cleanly (exit 0).
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:${PORT:-8000}/healthz').status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ------------------------------------------------------------------
  # Frontend — Next.js production build
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Set to the public URL of the deployed backend (HTTPS in production)
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
    container_name: trading-chatbot-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Runtime override (supplements build-arg)
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped

# No volumes — persistent storage lives in Supabase, not in a local pgdata volume.
